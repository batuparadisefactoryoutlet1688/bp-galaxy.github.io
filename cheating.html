<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cheating Day</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>

<style>

.info-card{
    background:#0b1b3a;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    color:white;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:20px;
}

.btn-stamp{
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.active{
    background:#00c3ff;
    color:black;
}

.disabled{
    background:#444;
    color:#ccc;
}

</style>

</head>

<body>

<br>

<img src="images/logo.png" class="logo">

<h3 class="title">
GALAXY PASSPORT
</h3>

<div class="container">

<h2 class="title">
🎮 CHEATING DAY
</h2>

<div class="card">

<input type="text"
id="passport"
placeholder="Input Passport">

<br><br>

<button class="btn-blue"
onclick="loadMember()">

CARI MEMBER

</button>

<div id="info"
class="info-card">

Masukkan nomor passport lalu tekan
CARI MEMBER

</div>

<div id="grid"
class="grid">

</div>

<br>

<button class="btn-red"
onclick="location='dashboard.html'">

KEMBALI

</button>

</div>

</div>

<script>

let ditemukan = false;

function loadMember(){

let passport =
document.getElementById("passport")
.value.trim();

if(passport==""){

    alert("Masukkan nomor passport.");

    return;

}

ditemukan = false;

document.getElementById("info").innerHTML =
"Mencari member...";

document.getElementById("grid").innerHTML =
"";

fetch(
API_URL +
"?action=search&passport=" +
passport
)

.then(r=>r.json())

.then(data=>{

    if(!data.success){

        document.getElementById("info")
        .innerHTML =
        "❌ Member tidak ditemukan";

        return;

    }

    ditemukan = true;

    document.getElementById("info")
    .innerHTML =

    "<b>" + data.nama + "</b><br>" +
    data.hp + "<br><br>" +
    "Stamp : " +
    data.total +
    " / 8";

    renderGrid(data);

});

}

function renderGrid(data){

let html = "";

for(let i=1;i<=8;i++){

    let status = data["stamp"+i];

    html += `

    <button
    class="btn-stamp
    ${status==1?'active':'disabled'}"

    onclick="setStamp(${i})">

    ${status==1 ? "⭐" : "⚪"}

    <br>

    ${i}

    </button>

    `;

}

document.getElementById("grid")
.innerHTML = html;

}

function setStamp(stamp){

if(!ditemukan){

    alert("Cari member terlebih dahulu.");

    return;

}

let passport =
document.getElementById("passport")
.value.trim();

let petugas =
localStorage.getItem("username");

fetch(

API_URL +
"?action=cheating" +
"&passport=" + passport +
"&stamp=" + stamp +
"&petugas=" + petugas

)

.then(r=>r.json())

.then(res=>{

    alert(res.message);

    loadMember();

});

}

</script>

</body>

</html>
