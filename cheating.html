<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cheating Day</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>

<style>

.info-card{
    background:#0b1b3a;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:15px;
}

.btn-stamp{
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:18px;
    cursor:pointer;
}

.active{
    background:#00c3ff;
    color:black;
}

.disabled{
    background:#333;
    color:#777;
}

</style>

</head>

<body>

<br>

<img src="images/logo.png" class="logo">

<h3 class="title">CHEATING DAY</h3>

<div class="container">

<div class="card">

<input type="text"
id="passport"
placeholder="Input Passport"
onkeyup="loadMember()">

<div id="info" class="info-card">
Masukkan passport untuk lihat data
</div>

<div id="grid" class="grid"></div>

<br>

<button class="btn-red" onclick="location='dashboard.html'">
KEMBALI
</button>

</div>

</div>

<script>

let currentData = null;

function loadMember(){

let passport = document.getElementById("passport").value;

if(passport.length < 3) return;

fetch(API_URL + "?action=search&passport=" + passport)

.then(r => r.json())

.then(data => {

if(!data.success){

document.getElementById("info").innerHTML =
"❌ Member tidak ditemukan";

document.getElementById("grid").innerHTML = "";

return;

}

currentData = data;

document.getElementById("info").innerHTML = `
<b>${data.nama}</b><br>
${data.hp}<br>
Stamp: ${data.total}/8
`;

renderGrid(data);

});

}

function renderGrid(data){

let html = "";

for(let i=1;i<=8;i++){

let status = data["stamp"+i];

html += `
<button class="btn-stamp ${status==1?'active':'disabled'}"
onclick="setStamp(${i})">

${status==1?'⭐':'⚪'} ${i}

</button>
`;

}

document.getElementById("grid").innerHTML = html;

}

function setStamp(stamp){

let passport = document.getElementById("passport").value;

fetch(API_URL +
"?action=cheating" +
"&passport=" + passport +
"&stamp=" + stamp +
"&petugas=" + localStorage.getItem("username"))

.then(r => r.json())

.then(res => {

if(res.success){

alert("Stamp " + stamp + " berhasil");

loadMember();

}else{

alert(res.message);

}

});

}

</script>

</body>

</html>
