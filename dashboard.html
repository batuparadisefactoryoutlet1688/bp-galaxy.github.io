<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<link rel="stylesheet"
href="css/style.css">

<style>

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.dashboard-card{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px 15px;
    text-align:center;
    color:white;
    font-size:20px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.dashboard-card:hover{
    transform:scale(1.03);
}

.stat{
    text-align:left;
    line-height:30px;
}

.big{
    font-size:30px;
    font-weight:bold;
}

.line{
    border-top:1px solid rgba(255,255,255,0.3);
    margin:15px 0;
}

@media(max-width:600px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<br>

<img src="images/logo.png"
class="logo">

<h3 class="title">
GALAXY PASSPORT
</h3>

<div class="container">

<h2 class="title">
Halo <span id="petugas"></span> 🚀
</h2>

<div class="grid">

<div class="dashboard-card"
onclick="location='register.html'">

👤

<br><br>

PENDAFTARAN

</div>

<div class="dashboard-card"
onclick="location='stamp.html'">

⭐

<br><br>

STAMP NORMAL

</div>

<div class="dashboard-card"
onclick="location='cheating.html'">

🎮

<br><br>

CHEATING DAY

</div>

<div class="dashboard-card"
onclick="location='report.html'">

🎟

<br><br>

REPORT

</div>

</div>

<br>

<button class="btn-red"
onclick="logout()">

LOGOUT

</button>

<br><br>

<div class="card stat">

<div class="big">

Member :
<span id="member">0</span>

</div>

<div class="line"></div>

<div>

⭐⭐⭐⭐⭐⭐⭐⭐ :
<span id="stamp8">0</span>

</div>

<div>

⭐⭐⭐⭐⭐⭐⭐⚪ :
<span id="stamp7">0</span>

</div>

<div>

⭐⭐⭐⭐⭐⭐⚪⚪ :
<span id="stamp6">0</span>

</div>

<div>

⭐⭐⭐⭐⭐⚪⚪⚪ :
<span id="stamp5">0</span>

</div>

<div>

⭐⭐⭐⭐⚪⚪⚪⚪ :
<span id="stamp4">0</span>

</div>

<div>

⭐⭐⭐⚪⚪⚪⚪⚪ :
<span id="stamp3">0</span>

</div>

<div>

⭐⭐⚪⚪⚪⚪⚪⚪ :
<span id="stamp2">0</span>

</div>

<div>

⭐⚪⚪⚪⚪⚪⚪⚪ :
<span id="stamp1">0</span>

</div>

<div class="line"></div>

<div class="big">

Belum Lengkap :
<span id="belum">0</span>

</div>

</div>

<br><br>

</div>

<script src="js/config.js"></script>

<script>

if(!localStorage.getItem("username")){

    window.location="index.html";

}

document.getElementById(
    "petugas"
).innerHTML =
localStorage.getItem(
    "username"
);

function logout(){

    localStorage.removeItem(
        "username"
    );

    window.location =
    "index.html";

}

fetch(
    API_URL +
    "?action=stats"
)

.then(r=>r.json())

.then(data=>{

    document.getElementById(
        "member"
    ).innerHTML =
    data.member;

    document.getElementById(
        "stamp8"
    ).innerHTML =
    data.stamp8;

    document.getElementById(
        "stamp7"
    ).innerHTML =
    data.stamp7;

    document.getElementById(
        "stamp6"
    ).innerHTML =
    data.stamp6;

    document.getElementById(
        "stamp5"
    ).innerHTML =
    data.stamp5;

    document.getElementById(
        "stamp4"
    ).innerHTML =
    data.stamp4;

    document.getElementById(
        "stamp3"
    ).innerHTML =
    data.stamp3;

    document.getElementById(
        "stamp2"
    ).innerHTML =
    data.stamp2;

    document.getElementById(
        "stamp1"
    ).innerHTML =
    data.stamp1;

    document.getElementById(
        "belum"
    ).innerHTML =
    data.belum;

});

</script>

</body>
</html>
