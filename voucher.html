<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Voucher Template</title>

<style>

body{
    background:#111;
    padding:20px;
}

.voucher{

    width:5cm;
    height:6cm;

    border:2px solid black;

    background:
    linear-gradient(
    180deg,
    #001c44 0%,
    #003b7a 60%,
    #c3002f 100%);

    color:white;

    font-family:Arial;

    box-sizing:border-box;

    padding:6px;

    position:relative;

    overflow:hidden;
}

.logo{

    width:18mm;

    height:18mm;

    display:block;

    margin:auto;
}

.title{

    text-align:center;

    color:white;

    font-size:10px;

    font-weight:bold;

    margin-top:3px;

    line-height:12px;
}

.subtitle{

    text-align:center;

    font-size:7px;

    color:#ffffff;

    margin-bottom:5px;
}

.line{

    border-top:1px solid white;

    margin:4px 0;
}

.info{

    font-size:8px;

    line-height:11px;

    word-break:break-word;
}

.label{

    font-weight:bold;
}

.nama{

    display:-webkit-box;

    -webkit-line-clamp:2;

    -webkit-box-orient:vertical;

    overflow:hidden;

    max-height:22px;
}

.stamp{

    position:absolute;

    bottom:8px;

    left:0;

    width:100%;

    text-align:center;

    font-size:22px;

    font-weight:bold;

    color:white;
}

</style>

</head>

<body>

<div class="voucher">

    <img src="images/logo.png"
    class="logo">

    <div class="title">
        GALAXY PASSPORT
    </div>

    <div class="subtitle">
        16TH ANNIVERSARY<br>
        BATU PARADISE VOUCHER
    </div>

    <div class="line"></div>

    <div class="info">

        <span class="label">
        Passport:
        </span>

        10001

        <br><br>

        <span class="label">
        Nama:
        </span>

        <div class="nama">
            Sandri Irawan Christopher
        </div>

        <br>

        <span class="label">
        HP:
        </span>

        08123456789

    </div>

    <div class="stamp">

        5 STAMP

    </div>

</div>

</body>

</html>
