<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Report Voucher</title>

<link rel="stylesheet"
href="css/style.css">

<script src="js/config.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

.report-card{
    background:#08162f;
    border-radius:15px;
    padding:20px;
    text-align:center;
    color:white;
    margin-top:20px;
}

.filter{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.filter button{
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-size:18px;
}

.big{
    font-size:40px;
    font-weight:bold;
}

.download{
    background:#00c853;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    width:100%;
    font-size:20px;
}

#printArea{

    position:absolute;
    left:-9999px;

    width:210mm;
    height:330mm;

    background:white;

    display:grid;

    grid-template-columns:
    repeat(4,50mm);

    grid-template-rows:
    repeat(5,60mm);

    padding-top:15mm;

    padding-left:5mm;

    box-sizing:border-box;
}

.voucher{

    width:50mm;
    height:60mm;

    border:1px solid black;

    box-sizing:border-box;

    padding:4mm;

    background:
    linear-gradient(
    180deg,
    #001c44,
    #003f88,
    #b1002d);

    color:white;

    position:relative;

    overflow:hidden;

    font-family:Arial;
}

.voucher-logo{

    width:16mm;

    display:block;

    margin:auto;
}

.voucher-title{

    text-align:center;

    font-size:9px;

    font-weight:bold;
}

.voucher-sub{

    text-align:center;

    font-size:6px;

    margin-bottom:4px;
}

.info{

    font-size:8px;

    line-height:10px;
}

.stamp{

    position:absolute;

    bottom:5mm;

    left:0;

    width:100%;

    text-align:center;

    font-size:18px;

    font-weight:bold;
}

</style>

</head>

<body>

<br>

<img src="images/logo.png"
class="logo">

<h3 class="title">
GALAXY PASSPORT
</h3>

<div class="container">

<h2 class="title">
🎟 REPORT VOUCHER
</h2>

<div class="card">

<div class="filter">

<button onclick="loadData(8)">8⭐</button>
<button onclick="loadData(7)">7⭐</button>
<button onclick="loadData(6)">6⭐</button>
<button onclick="loadData(5)">5⭐</button>

<button onclick="loadData(4)">4⭐</button>
<button onclick="loadData(3)">3⭐</button>
<button onclick="loadData(2)">2⭐</button>
<button onclick="loadData(1)">1⭐</button>

</div>

</div>

<div id="hasil"></div>

<br>

<button class="btn-red"
onclick="location='dashboard.html'">

KEMBALI

</button>

</div>

<div id="printArea"></div>

<script>

let currentData = [];
let currentStamp = 0;

async function loadData(stamp){

    currentStamp = stamp;

    const res =
    await fetch(
        API_URL +
        "?action=voucher&total=" +
        stamp
    );

    currentData =
    await res.json();

    document.getElementById(
        "hasil"
    ).innerHTML = `

    <div class="report-card">

        <h2>
        ${stamp} STAR
        </h2>

        <div class="big">
        ${currentData.length}
        </div>

        Total Peserta

        <br><br>

        <button class="download"
        onclick="downloadPDF()">

        📄 DOWNLOAD PDF

        </button>

    </div>

    `;
}

async function downloadPDF(){

    if(currentData.length==0){

        alert("Tidak ada data");

        return;

    }

    const { jsPDF } =
    window.jspdf;

    const doc =
    new jsPDF({

        orientation:"landscape",

        unit:"mm",

        format:[330,210]

    });

    let index = 0;

    while(index < currentData.length){

        let html = "";

        for(let i=0;i<20;i++){

            if(index >= currentData.length)
            break;

            let m =
            currentData[index];

            html += `

            <div class="voucher">

                <img src="images/logo.png"
                class="voucher-logo">

                <div class="voucher-title">

                GALAXY PASSPORT

                </div>

                <div class="voucher-sub">

                16TH ANNIVERSARY<br>
                BATU PARADISE

                </div>

                <hr>

                <div class="info">

                Passport:
                ${m.passport}

                <br><br>

                Nama:
                ${m.nama}

                <br><br>

                HP:
                ${m.hp}

                </div>

                <div class="stamp">

                ${currentStamp}
                STAMP

                </div>

            </div>

            `;

            index++;

        }

        document.getElementById(
        "printArea"
        ).innerHTML = html;

        await new Promise(
        r => setTimeout(r,300)
        );

        const canvas =
        await html2canvas(

        document.getElementById(
        "printArea"
        ),

        {
            scale:2
        }

        );

        const img =
        canvas.toDataURL(
        "image/jpeg",
        1
        );

        doc.addImage(

        img,

        "JPEG",

        0,

        0,

        330,

        210

        );

        if(index <
        currentData.length){

            doc.addPage();

        }

    }

    doc.save(

    "Voucher_" +
    currentStamp +
    "_Star.pdf"

    );

}

</script>

</body>

</html>
