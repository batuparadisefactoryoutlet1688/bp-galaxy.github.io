<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Report</title>

<link rel="stylesheet"
href="css/style.css">

<script src="js/config.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.report-card{
    background:#0b1b3a;
    border-radius:15px;
    padding:20px;
    text-align:center;
    color:white;
    margin-top:20px;
}

.filter{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.filter button{
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-size:18px;
}

.big{
    font-size:40px;
    font-weight:bold;
}

.download{
    background:#00c853;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    width:100%;
    font-size:20px;
}

</style>

</head>

<body>

<br>

<img src="images/logo.png" class="logo">

<h3 class="title">
GALAXY PASSPORT
</h3>

<div class="container">

<h2 class="title">
🎟 REPORT VOUCHER
</h2>

<div class="card">

<div class="filter">

<button onclick="loadData(8)">8⭐</button>
<button onclick="loadData(7)">7⭐</button>
<button onclick="loadData(6)">6⭐</button>
<button onclick="loadData(5)">5⭐</button>

<button onclick="loadData(4)">4⭐</button>
<button onclick="loadData(3)">3⭐</button>
<button onclick="loadData(2)">2⭐</button>
<button onclick="loadData(1)">1⭐</button>

</div>

</div>

<div id="hasil"></div>

<br>

<button class="btn-red"
onclick="location='dashboard.html'">

KEMBALI

</button>

</div>

<script>

let currentData = [];
let currentStamp = 0;

async function loadData(stamp){

    currentStamp = stamp;

    const res =
    await fetch(
        API_URL +
        "?action=voucher&total=" +
        stamp
    );

    currentData =
    await res.json();

    document.getElementById(
        "hasil"
    ).innerHTML = `

    <div class="report-card">

        <h2>
        ${stamp} STAR
        </h2>

        <div class="big">
        ${currentData.length}
        </div>

        Total Peserta

        <br><br>

        <button class="download"
        onclick="downloadPDF()">

        📄 DOWNLOAD PDF

        </button>

    </div>

    `;
}

function downloadPDF(){

    if(currentData.length==0){

        alert("Tidak ada data");

        return;

    }

    const { jsPDF } =
    window.jspdf;

    const doc =
    new jsPDF({

        orientation:"portrait",

        unit:"mm",

        format:[330,210]

    });

    let x = 5;
    let y = 15;

    let col = 0;
    let row = 0;

    currentData.forEach((m,index)=>{

        doc.setDrawColor(0);
        doc.rect(x,y,50,60);

        doc.setFontSize(10);
        doc.text(
        "GALAXY PASSPORT",
        x+5,
        y+8
        );

        doc.setFontSize(7);

        doc.text(
        "16TH ANNIVERSARY",
        x+8,
        y+13
        );

        doc.text(
        "BATU PARADISE",
        x+10,
        y+17
        );

        doc.line(
        x+2,
        y+20,
        x+48,
        y+20
        );

        doc.setFontSize(8);

        doc.text(
        "Passport:",
        x+3,
        y+28
        );

        doc.text(
        String(m.passport),
        x+20,
        y+28
        );

        let nama =
        String(m.nama);

        nama =
        doc.splitTextToSize(
        nama,
        28
        );

        if(nama.length > 2){

            nama =
            nama.slice(0,2);

        }

        doc.text(
        "Nama:",
        x+3,
        y+37
        );

        doc.text(
        nama,
        x+20,
        y+37
        );

        doc.text(
        "HP:",
        x+3,
        y+50
        );

        doc.text(
        String(m.hp),
        x+20,
        y+50
        );

        doc.setFontSize(18);

        doc.text(
        currentStamp +
        " STAMP",
        x+10,
        y+57
        );

        col++;

        if(col>=4){

            col = 0;

            row++;

            x = 5;

            y += 60;

        }else{

            x += 50;

        }

        if(row>=5){

            if(index <
            currentData.length-1){

                doc.addPage();

            }

            row = 0;
            col = 0;

            x = 5;
            y = 15;

        }

    });

    doc.save(

    "Voucher_" +
    currentStamp +
    "_Star.pdf"

    );

}

</script>

</body>

</html>
